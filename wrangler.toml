name = "ai-traffic-alerts-for-cloudflare"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# 1) Route this Worker in front of your site. Replace with your zone and pattern.
# routes = [ { pattern = "example.com/*", zone_name = "example.com" } ]

# 2) Optional but recommended: a KV namespace to throttle high-volume crawler
#    alerts (one per vendor+purpose per window). Create it with:
#      npx wrangler kv namespace create RADAR_KV
#    then paste the returned id below and uncomment the block.
# [[kv_namespaces]]
# binding = "RADAR_KV"
# id = "<your-kv-namespace-id>"

[vars]
# What to alert on: "referrals" (humans an AI sent you), "crawlers" (AI bots),
# or "both". Default is "referrals": the rare, high-value signal. Crawlers can be
# thousands of hits a day, so alerting on them is opt-in. "referrals" also skips
# crawler detection entirely, so you need no KV namespace.
ALERT_ON = "referrals"

# Only used when crawler alerts are on. One crawler alert per vendor+purpose per
# N seconds. Set to "0" to alert on every crawl (noisy), or raise it if your
# phone buzzes too much.
CRAWLER_THROTTLE_SECONDS = "3600"

# Optional. Force the domain shown in the alert text. Leave unset in production:
# the alert then reports the Host the visitor actually hit (your routed domain).
# Set it only if you want a fixed label while testing on a *.workers.dev URL.
# SITE_DOMAIN = "mysite.com"

# Self-hosting ntfy? Set the server here (not sensitive). Defaults to ntfy.sh.
# NTFY_SERVER = "https://ntfy.sh"

# NOTE: sensitive values are NEVER put in [vars] and NEVER committed. This repo
# is public, and on a Git-connected (Builds) Worker every deploy rebuilds from
# this file, so [vars] is treated as the complete set: any plaintext variable
# you add only in the dashboard gets wiped on the next build. NTFY_TOPIC acts
# like a password (anyone who knows it can read your alerts), so it and every
# channel token must be SECRETS, which are stored separately and survive builds:
#   npx wrangler secret put NTFY_TOPIC           # your long, hard-to-guess topic
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put TELEGRAM_CHAT_ID
#   npx wrangler secret put WHATSAPP_PHONE       # your number incl. country code, e.g. +15551234567
#   npx wrangler secret put WHATSAPP_APIKEY      # from CallMeBot activation
#   npx wrangler secret put DISCORD_WEBHOOK_URL
#   npx wrangler secret put PUSHOVER_TOKEN
#   npx wrangler secret put PUSHOVER_USER
#   npx wrangler secret put GENERIC_WEBHOOK_URL   # POST raw JSON event anywhere
# In the dashboard the equivalent is Settings > Variables and secrets > Add >
# Type: Secret.
